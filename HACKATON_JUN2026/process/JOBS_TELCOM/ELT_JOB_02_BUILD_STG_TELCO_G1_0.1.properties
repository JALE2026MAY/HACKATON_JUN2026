  <TalendProperties:Property xmi:id="_NGmqUGpkEfGZ2ujDAi3OWQ" id="_NGlcMGpkEfGZ2ujDAi3OWQ" label="ELT_JOB_02_BUILD_STG_TELCO_G1" purpose="Construir la capa STG/SILVER del producto Telco Retention Intelligence a partir de la tabla RAW cargada en SingleStore." description="Este job orquesta la transformación ELT de la capa RAW hacia la capa STG del dataset IBM Telco Customer Churn. Toma la última ejecución RAW válida, limpia campos de texto, convierte tipos de datos, imputa TotalCharges cuando corresponde, calcula variables derivadas como churn_flag, service_score, service_level, tenure_segment, monthly_charge_band y segment_key, y registra la ejecución en la tabla de auditoría pipeline_run_audit_grupo_uno. La salida de este job será usada posteriormente para reglas de calidad DQ, segmentación de clientes, recomendador de retención, MART analítica, Snowflake GOLD y dashboard." version="0.1" statusCode="" item="_NGmqUmpkEfGZ2ujDAi3OWQ" displayName="ELT_JOB_02_BUILD_STG_TELCO_G1">
