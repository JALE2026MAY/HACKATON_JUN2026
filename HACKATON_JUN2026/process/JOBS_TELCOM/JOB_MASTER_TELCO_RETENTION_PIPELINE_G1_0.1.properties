  <TalendProperties:Property xmi:id="_-B5soGuCEfGatM45PvNViw" id="_-B00IGuCEfGatM45PvNViw" label="JOB_MASTER_TELCO_RETENTION_PIPELINE_G1" purpose="El propósito del job maestro es centralizar y automatizar la ejecución end-to-end del pipeline Telco, evitando ejecuciones manuales separadas y demostrando que el producto de datos es reproducible, trazable y listo para consumo analítico en Tableau Cloud. Este job permite presentar un flujo limpio desde la ingesta del dataset IBM Telco hasta la publicación de las tablas finales utilizadas por los dashboards ejecutivos de churn, retención y calidad de datos." description="JOB_MASTER_TELCO_RETENTION_PIPELINE_G1 orquesta la ejecución completa del producto de datos Telco Retention Intelligence. Ejecuta de forma secuencial los jobs de ingesta hacia SingleStore, construcción de la capa STG, cálculo de calidad de datos, construcción del modelo GOLD, generación de acciones de retención y publicación analítica en Snowflake." version="0.1" statusCode="" item="_-B5somuCEfGatM45PvNViw" displayName="JOB_MASTER_TELCO_RETENTION_PIPELINE_G1">
