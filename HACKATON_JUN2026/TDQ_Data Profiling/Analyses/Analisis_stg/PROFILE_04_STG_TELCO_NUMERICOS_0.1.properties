  <TalendProperties:Property xmi:id="_1bJ6K2qOEfG1lqxu6qhfiQ" id="_1bJ6IGqOEfG1lqxu6qhfiQ" label="PROFILE_04_STG_TELCO_NUMERICOS" purpose="Perfilar las variables numéricas y flags binarios de la capa STG/Silver para validar rangos, valores mínimos, máximos, promedios, nulos y distribución de indicadores derivados." description="Este análisis revisa las columnas senior_citizen, partner_flag, dependents_flag, tenure_months, paperless_billing_flag, monthly_charges, total_charges, total_charges_was_imputed, churn_flag y service_score de la tabla stg_telco_customer_churn_grupo_uno. El objetivo es comprobar que las conversiones numéricas realizadas en STG/Silver fueron correctas, que no existen rangos incoherentes y que los flags binarios contienen únicamente valores válidos 0 y 1. También se revisa service_score como variable derivada para segmentación posterior." version="0.1" statusCode="Draft" item="_1bKhMWqOEfG1lqxu6qhfiQ" displayName="PROFILE_04_STG_TELCO_NUMERICOS">
