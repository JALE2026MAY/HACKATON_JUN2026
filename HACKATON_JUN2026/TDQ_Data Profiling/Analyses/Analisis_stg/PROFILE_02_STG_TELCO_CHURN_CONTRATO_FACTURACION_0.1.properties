  <TalendProperties:Property xmi:id="_uUJQqmqNEfG1lqxu6qhfiQ" id="_uUDKAGqNEfG1lqxu6qhfiQ" label="PROFILE_02_STG_TELCO_CHURN_CONTRATO_FACTURACION" purpose="Perfilar la variable objetivo de churn y las columnas de contrato, facturación y método de pago para validar su completitud, distribución y coherencia en la capa STG/Silver." description="Este análisis revisa las columnas churn_label, churn_flag, contract_type, paperless_billing_flag, payment_method, monthly_charges, total_charges, total_charges_raw y total_charges_was_imputed de la tabla stg_telco_customer_churn_grupo_uno. El objetivo es validar que la variable objetivo Churn esté correctamente estandarizada en formato textual y binario, que los dominios de contrato y método de pago estén controlados, y que las variables de facturación tengan rangos numéricos coherentes. También se revisa la marca de imputación de total_charges para documentar el tratamiento de valores faltantes." version="0.1" statusCode="Draft" item="_uUJQrGqNEfG1lqxu6qhfiQ" displayName="PROFILE_02_STG_TELCO_CHURN_CONTRATO_FACTURACION">
