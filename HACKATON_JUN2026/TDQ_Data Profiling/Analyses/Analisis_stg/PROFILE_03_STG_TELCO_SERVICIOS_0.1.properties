  <TalendProperties:Property xmi:id="_Tc0MamqOEfG1lqxu6qhfiQ" id="_TczlUGqOEfG1lqxu6qhfiQ" label="PROFILE_03_STG_TELCO_SERVICIOS" purpose="Perfilar las columnas de servicios TELCO contratados para validar dominios categóricos, completitud y coherencia de servicios telefónicos, internet y servicios digitales." description="Este análisis evalúa las columnas phone_service, multiple_lines, internet_service, online_security, online_backup, device_protection, tech_support, streaming_tv y streaming_movies de la tabla stg_telco_customer_churn_grupo_uno. El objetivo es revisar la distribución de los servicios contratados, verificar que los dominios categóricos estén controlados y generar evidencia sobre la composición de servicios de los clientes para posteriores análisis de churn, segmentación y acciones de retención." version="0.1" statusCode="Draft" item="_Tc0MbGqOEfG1lqxu6qhfiQ" displayName="PROFILE_03_STG_TELCO_SERVICIOS">
